name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-headless:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: headless
          - os: macos-latest
            preset: headless
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config

      - name: Configure and build
        run: |
          cmake --preset "${{ matrix.preset }}"
          cmake --build --preset "${{ matrix.preset }}"

      - name: CTest
        run: ctest --test-dir "${{ github.workspace }}/build/${{ matrix.preset }}" --output-on-failure
