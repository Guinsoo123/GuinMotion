name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-headless:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: headless
          - os: macos-latest
            preset: headless
    runs-on: ${{ matrix.os }}
    env:
      GUINMOTION_PRESET: ${{ matrix.preset }}
      GUINMOTION_SKIP_QT: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          ./script/install_deps.sh

      - name: Configure, build, and test
        run: |
          ./script/ci_build.sh
